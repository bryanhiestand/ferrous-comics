# git-cliff configuration
# Used by:
#   - one-shot historical CHANGELOG generation: `git-cliff -o CHANGELOG.md`
#   - release-plz (referenced from release-plz.toml as `changelog_config`)

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

"""
body = """

{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | upper_first }}{% if commit.breaking %} [**breaking**]{% endif %}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactors" },
  { message = "^docs", group = "Documentation" },
  { message = "^build", group = "Build System" },
  { message = "^ci", group = "CI" },
  { message = "^chore", skip = true },
  { message = "^test", skip = true },
  { message = "^.*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
